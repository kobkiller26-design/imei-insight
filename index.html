<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMEI Insight</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#f4f6f9;
font-family:Arial;
}

.box{
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 10px 20px rgba(0,0,0,0.15);
width:90%;
max-width:500px;
text-align:center;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:6px;
}

button{
padding:12px 18px;
border:none;
background:black;
color:white;
border-radius:6px;
margin:5px;
}

.row{
display:flex;
gap:10px;
}

</style>
</head>

<body>

<div class="box">

<h2>IMEI Check</h2>

<input placeholder="Email">
<input placeholder="Password">

<button>Login</button>

<hr>

<input id="imei" placeholder="Enter IMEI">

<div class="row">
<button>Pay</button>
<button>Check</button>
</div>

</div>

</body>
</html>
