<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IMEI Insight</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:30px;
border-radius:10px;
width:340px;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

input,select{
width:100%;
padding:10px;
margin:8px 0;
border-radius:5px;
border:1px solid #ccc;
}

button{
width:100%;
padding:10px;
background:black;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
margin-top:6px;
}

pre{
background:#eee;
padding:10px;
margin-top:10px;
height:120px;
overflow:auto;
}

</style>

</head>

<body>

<div class="box">

<h3>IMEI Check</h3>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="register()">Register</button>
<button onclick="login()">Login</button>

<hr>

<select id="services"></select>

<input id="imei" placeholder="Enter IMEI">

<button onclick="checkIMEI()">Check</button>

<pre id="result"></pre>

</div>

<script>

async function loadServices(){

const res = await fetch("/api/services")
const data = await res.json()

const select = document.getElementById("services")

select.innerHTML=""

data.services.forEach(service=>{
const option=document.createElement("option")
option.value=service.serviceid
option.text=service.servicename
select.appendChild(option)
})

}

async function register(){

const email=document.getElementById("email").value
const password=document.getElementById("password").value

const res=await fetch("/api/register",{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({email,password})
})

const data=await res.json()

alert(data.success?"Account created":data.error)

}

async function login(){

const email=document.getElementById("email").value
const password=document.getElementById("password").value

const res=await fetch("/api/login",{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({email,password})
})

const data=await res.json()

alert(data.success?"Login successful":data.error)

}

async function checkIMEI(){

const imei=document.getElementById("imei").value
const service=document.getElementById("services").value

const res=await fetch("/api/api-check",{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({imei,service})
})

const data=await res.json()

document.getElementById("result").innerText =
JSON.stringify(data,null,2)

}

loadServices()

</script>

</body>
</html>
